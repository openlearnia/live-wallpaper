name: Release Live Wallpaper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: projects/tools/livewallpaper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add WiX Toolset v3 to PATH
        shell: pwsh
        run: |
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wixBin)) {
            choco install wixtoolset -y --no-progress
          }
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      - name: Build MSI
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build-installer.ps1

      - name: Create portable zip
        shell: pwsh
        run: |
          $csproj = "src/LiveWallpaper.App/LiveWallpaper.App.csproj"
          $version = (Select-Xml -Path $csproj -XPath "//Version[1]").Node.InnerText.Trim()
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath "dist/LiveWallpaper-$version-win-x64-portable.zip" -Force

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { '${{ github.ref_name }}' }
          $csproj = "src/LiveWallpaper.App/LiveWallpaper.App.csproj"
          $version = (Select-Xml -Path $csproj -XPath "//Version[1]").Node.InnerText.Trim()
          $msi = "dist/LiveWallpaper-$version-x64.msi"
          $zip = "dist/LiveWallpaper-$version-win-x64-portable.zip"
          if (-not (Test-Path $msi)) { throw "MSI not found: $msi" }
          if (-not (Test-Path $zip)) { throw "Portable zip not found: $zip" }
          $ghArgs = @(
            'release', 'create', $tag,
            '--repo', '${{ github.repository }}',
            '--title', "Live Wallpaper $version",
            '--notes', "Windows x64 MSI installer and portable zip for Live Wallpaper $version."
          )
          if ($version -match '^0\.') { $ghArgs += '--prerelease' }
          $ghArgs += (Resolve-Path $msi).Path
          $ghArgs += (Resolve-Path $zip).Path
          gh @ghArgs
