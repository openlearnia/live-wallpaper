name: Build Live Wallpaper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: projects/tools/livewallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build LiveWallpaper.sln -c Release
      - run: dotnet test LiveWallpaper.sln -c Release --no-build
